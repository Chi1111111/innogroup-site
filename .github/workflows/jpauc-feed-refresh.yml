name: JPAUC Feed Refresh

on:
  schedule:
    # GitHub cron uses UTC. We trigger at both 11:00 and 12:00 UTC, then gate by
    # Pacific/Auckland local hour so it effectively runs once at local 00:00
    # across NZDT/NZST daylight-saving changes.
    - cron: '0 11,12 * * *'
  workflow_dispatch:
    inputs:
      sync_mode:
        description: 'quick or full scrape mode'
        required: true
        default: 'full'
        type: choice
        options:
          - quick
          - full

permissions:
  contents: write

concurrency:
  group: jpauc-feed-refresh
  cancel-in-progress: true

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Decide if this schedule run matches NZ midnight
        if: github.event_name == 'schedule'
        id: nz_midnight_gate
        env:
          TZ: Pacific/Auckland
        run: |
          hour="$(date +%H)"
          if [ "$hour" = "00" ]; then
            echo "run_now=true" >> "$GITHUB_OUTPUT"
            echo "Running scheduled refresh at NZ midnight."
          else
            echo "run_now=false" >> "$GITHUB_OUTPUT"
            echo "Skipping: not NZ midnight (current NZ hour: $hour)."
          fi

      - name: Setup Node
        if: github.event_name != 'schedule' || steps.nz_midnight_gate.outputs.run_now == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Dependencies
        if: github.event_name != 'schedule' || steps.nz_midnight_gate.outputs.run_now == 'true'
        run: npm ci

      - name: Install Playwright Chromium
        if: github.event_name != 'schedule' || steps.nz_midnight_gate.outputs.run_now == 'true'
        run: npx playwright install --with-deps chromium

      - name: Scrape Latest JPAUC Data
        if: github.event_name != 'schedule' || steps.nz_midnight_gate.outputs.run_now == 'true'
        env:
          JPAUC_HEADLESS: 'true'
          JPAUC_MAX_PAGES: ${{ (github.event_name == 'workflow_dispatch' && github.event.inputs.sync_mode == 'full') && '5000' || '12' }}
          JPAUC_MAX_VEHICLES: ${{ (github.event_name == 'workflow_dispatch' && github.event.inputs.sync_mode == 'full') && '0' || '0' }}
          JPAUC_DETAIL_CONCURRENCY: ${{ (github.event_name == 'workflow_dispatch' && github.event.inputs.sync_mode == 'full') && '2' || '3' }}
          JPAUC_WAIT_MS: ${{ (github.event_name == 'workflow_dispatch' && github.event.inputs.sync_mode == 'full') && '250' || '1000' }}
          JPAUC_SKIP_DETAIL: ${{ (github.event_name == 'workflow_dispatch' && github.event.inputs.sync_mode == 'full') && 'true' || 'false' }}
        run: npm run jpauc:scrape

      - name: Scrape Latest JPAUC One Price (Japan)
        if: github.event_name != 'schedule' || steps.nz_midnight_gate.outputs.run_now == 'true'
        env:
          JPAUC_ONEPRICE_HEADLESS: 'true'
          JPAUC_ONEPRICE_MAX_PAGES: ${{ (github.event_name == 'workflow_dispatch' && github.event.inputs.sync_mode == 'full') && '5000' || '12' }}
          JPAUC_ONEPRICE_MAX_VEHICLES: ${{ (github.event_name == 'workflow_dispatch' && github.event.inputs.sync_mode == 'full') && '0' || '0' }}
          JPAUC_ONEPRICE_DETAIL_CONCURRENCY: ${{ (github.event_name == 'workflow_dispatch' && github.event.inputs.sync_mode == 'full') && '2' || '3' }}
          JPAUC_ONEPRICE_WAIT_MS: ${{ (github.event_name == 'workflow_dispatch' && github.event.inputs.sync_mode == 'full') && '250' || '1000' }}
          JPAUC_ONEPRICE_SKIP_DETAIL: ${{ (github.event_name == 'workflow_dispatch' && github.event.inputs.sync_mode == 'full') && 'true' || 'false' }}
        run: npm run jpauc:oneprice:japan:scrape

      - name: Commit Updated Feed
        if: github.event_name != 'schedule' || steps.nz_midnight_gate.outputs.run_now == 'true'
        run: |
          if git diff --quiet -- data/imports/jpauc-vehicles.json public/data/jpauc-vehicles.json data/imports/jpauc-oneprice-japan-vehicles.json public/data/jpauc-oneprice-japan-vehicles.json; then
            echo "No changes in JPAUC feed."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/imports/jpauc-vehicles.json public/data/jpauc-vehicles.json data/imports/jpauc-oneprice-japan-vehicles.json public/data/jpauc-oneprice-japan-vehicles.json
          git commit -m "chore: refresh JPAUC feed data"
          git push
